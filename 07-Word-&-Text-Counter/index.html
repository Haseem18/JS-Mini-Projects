<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <section id="root">
        <article class="container">

            <div class="header">
                <h1>Character Counter</h1>
                <p>Keep track of your writing in real time.</p>
            </div>

            <div class="textarea-box">
                <textarea placeholder="Start typing here..."></textarea>
                <p class="limit">0 / 150</p>
            </div>

            <div class="stats">

                <div class="card">
                    <h2>Words</h2>
                    <p>0</p>
                </div>

                <div class="card">
                    <h2>Characters</h2>
                    <p class="text">0</p>
                </div>

            </div>

        </article>
    </section>
    
    <script src="./main.js"></script>

</body>
</html>
