<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="root">
        <div class="container">
            <h1>Love Calculator</h1>
            <form>
                <div class="input-group">
                    <input class="boy" type="text" placeholder="Boy name..." autofocus>
                    <input class="girl" type="text" placeholder="Girl name...">
                </div>
                <button type="submit">Calculate Love</button>
            </form>
            <div class="result-box hidden">
                <p class="percentage">100%</p>
                <p class="message">A Match Made in Heaven!</p>
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
