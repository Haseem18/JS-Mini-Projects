<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Angeles 2028 Countdown</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<section id="root">

    <article class="container">

        <p class="badge">🏅 SUMMER OLYMPICS 2028</p>

        <h1>Los Angeles 2028</h1>

        <p class="subtitle">
            Countdown to the Opening Ceremony
        </p>

        <div class="event-info">
            <span>📍 Los Angeles, USA</span>
            <span>📅 14 July 2028</span>
        </div>

        <div class="countdown">

            <div class="card">
                <h2 class="days">000</h2>
                <span>Days</span>
            </div>

            <div class="card">
                <h2 class="hours">00</h2>
                <span>Hours</span>
            </div>

            <div class="card">
                <h2 class="minutes">00</h2>
                <span>Minutes</span>
            </div>

            <div class="card">
                <h2 class="seconds">00</h2>
                <span>Seconds</span>
            </div>

        </div>

    </article>

</section>

<script src="./main.js"></script>

</body>
</html>
