<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Quote Generator</title>
    <!-- Premium Font Link Fixed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <section id="root">
        <article class="container">
            <div class="profile">
                <img src="https://unsplash.com" alt="Author Profile" class="quote-img">
            </div>
            <div class="quote-content">
                <p class="quote-text">“The only way to do great work is to love what you do.”</p>
                <p class="quote-author">— Steve Jobs</p>
            </div>
            <button class="generate-btn">Generate New Quote</button>
        </article>
    </section>

    <script src="./main.js"></script>
</body>

</html>
